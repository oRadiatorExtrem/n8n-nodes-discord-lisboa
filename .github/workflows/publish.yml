name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for npm Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # No registry-url here — it creates an .npmrc with empty token
          # that blocks OIDC auth. npm defaults to registry.npmjs.org anyway.

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Publish via Trusted Publishing (OIDC)
        run: npm publish --access public --provenance
        env:
          # npm >= 9.5 uses these env vars to exchange the OIDC token
          # for a temporary publish token when Trusted Publisher is configured
          ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
          ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
