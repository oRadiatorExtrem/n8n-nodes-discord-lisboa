name: Publish to npm

# Triggers when you create a GitHub Release (tag v1.0.1, v1.1.0, etc.)
on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # Required for npm Trusted Publishing (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Publish (Trusted Publishing — no token required)
        run: npm publish --access public --provenance
